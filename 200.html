<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Peptides">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Peptide Tracker</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #1a1118;
      --surface2: #1f1520;
      --accent: #f48fb1;
      --accent2: #f8bbd0;
      --cream: #f5e6d3;
      --text: #f5e6d3;
      --text-dim: #a89585;
      --success: #f48fb1;
      --warning: #ffb347;
      --danger: #ff6b6b;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, var(--surface), var(--surface2));
      padding: 16px 16px;
      border-bottom: 1px solid rgba(244,143,177,0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    header h1 {
      font-size: 1.4rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    nav {
      display: flex;
      gap: 3px;
      background: var(--bg);
      padding: 3px;
      border-radius: var(--radius);
      flex-wrap: wrap;
    }
    nav button {
      padding: 7px 12px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    nav button.active { background: var(--accent); color: white; }
    main { max-width: 800px; margin: 0 auto; padding: 20px 12px; }
    .tab { display: none; }
    .tab.active { display: block; }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .card h2 { font-size: 1.05rem; margin-bottom: 14px; color: var(--accent2); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
    input, select, textarea {
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 60px; }
    .btn {
      padding: 10px 20px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all 0.2s;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    .btn-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .log-entry {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; background: var(--bg); border-radius: 8px;
      margin-bottom: 8px; border-left: 3px solid var(--accent);
    }
    .log-entry .info { flex: 1; }
    .log-entry .peptide-name { font-weight: 600; font-size: 0.95rem; }
    .log-entry .details { font-size: 0.82rem; color: var(--text-dim); margin-top: 2px; }
    .log-entry .dose-badge {
      background: rgba(244,143,177,0.2); color: var(--accent2);
      padding: 4px 10px; border-radius: 20px; font-size: 0.82rem;
      font-weight: 600; margin-right: 10px; white-space: nowrap;
    }
    .log-entry .delete-btn {
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 1.1rem; padding: 4px; opacity: 0.5; transition: opacity 0.2s;
    }
    .log-entry .delete-btn:hover { opacity: 1; color: var(--danger); }
    .empty-state { text-align: center; padding: 30px; color: var(--text-dim); }
    .calc-result {
      background: linear-gradient(135deg, rgba(244,143,177,0.15), rgba(255,107,157,0.1));
      border: 1px solid rgba(244,143,177,0.3); border-radius: var(--radius);
      padding: 20px; margin-top: 16px; text-align: center;
    }
    .calc-result .big-number {
      font-size: 2.5rem; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .calc-result .unit { color: var(--text-dim); font-size: 0.9rem; }
    .calc-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    .calc-breakdown .item { background: var(--bg); padding: 12px; border-radius: 8px; text-align: center; }
    .calc-breakdown .item .val { font-size: 1.2rem; font-weight: 600; color: var(--success); }
    .calc-breakdown .item .lbl { font-size: 0.75rem; color: var(--text-dim); margin-top: 2px; }
    .inv-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; background: var(--bg); border-radius: 8px; margin-bottom: 8px;
    }
    .inv-item .remaining { font-size: 0.85rem; color: var(--text-dim); }
    .inv-item .remaining.low { color: var(--warning); }
    .inv-item .remaining.out { color: var(--danger); }
    .progress-bar { width: 100px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-top: 4px; }
    .progress-bar .fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .schedule-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: var(--bg); border-radius: 8px; margin-bottom: 8px;
    }
    .schedule-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .schedule-dot.due { background: var(--warning); animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,179,71,0.4); }
      50% { box-shadow: 0 0 0 6px rgba(255,179,71,0); }
    }
    .filter-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-row select, .filter-row input { flex: 1; min-width: 120px; }
    .stat-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
    .stat-card {
      background: var(--surface); border-radius: var(--radius); padding: 14px;
      text-align: center; border: 1px solid rgba(255,255,255,0.05);
    }
    .stat-card .val { font-size: 1.4rem; font-weight: 700; color: var(--accent2); }
    .stat-card .lbl { font-size: 0.7rem; color: var(--text-dim); margin-top: 4px; }

    /* Calendar styles */
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-top: 8px;
    }
    .cal-header { text-align: center; font-size: 0.7rem; color: var(--text-dim); padding: 6px 0; font-weight: 600; }
    .cal-day {
      aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; border-radius: 8px; font-size: 0.85rem; position: relative;
      cursor: pointer; transition: background 0.2s;
    }
    .cal-day:hover { background: var(--surface2); }
    .cal-day.today { border: 2px solid var(--accent); }
    .cal-day.empty { pointer-events: none; }
    .cal-day .dots { display: flex; gap: 2px; margin-top: 2px; }
    .cal-day .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
    .cal-day .dot.multi { background: var(--accent2); }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .cal-nav button { background: none; border: none; color: var(--accent); font-size: 1.2rem; cursor: pointer; padding: 4px 12px; }
    .cal-nav .month-label { font-weight: 600; font-size: 1rem; }
    .cal-day-detail { margin-top: 14px; }
    .last-taken {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: var(--bg); border-radius: 8px; margin-bottom: 6px;
    }
    .last-taken .days-ago { font-size: 0.85rem; font-weight: 600; }
    .last-taken .days-ago.recent { color: var(--success); }
    .last-taken .days-ago.overdue { color: var(--warning); }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .stat-cards { grid-template-columns: 1fr; }
      .calc-breakdown { grid-template-columns: 1fr; }
      header { padding: 12px; }
      header h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Peptide Tracker</h1>
  <nav>
    <button class="active" onclick="showTab('log')">Log</button>
    <button onclick="showTab('calendar')">Calendar</button>
    <button onclick="showTab('calculator')">Calc</button>
    <button onclick="showTab('inventory')">Inventory</button>
    <button onclick="showTab('schedule')">Schedule</button>
  </nav>
</header>

<main>

  <!-- ==================== LOG TAB ==================== -->
  <div id="tab-log" class="tab active">
    <div class="stat-cards" id="stats"></div>

    <div class="card">
      <h2>Log a Dose</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Peptide</label>
          <select id="log-peptide">
            <option value="">Select or type below</option>
          </select>
        </div>
        <div class="form-group">
          <label>Or add new</label>
          <input type="text" id="log-peptide-new" placeholder="e.g. BPC-157">
        </div>
        <div class="form-group">
          <label>Amount</label>
          <input type="number" id="log-dose" placeholder="10" step="any">
        </div>
        <div class="form-group">
          <label>Unit</label>
          <select id="log-unit">
            <option value="units">Units (insulin syringe)</option>
            <option value="mcg">mcg</option>
            <option value="mg">mg</option>
            <option value="mL">mL</option>
            <option value="IU">IU</option>
          </select>
        </div>
        <div class="form-group">
          <label>Route</label>
          <select id="log-route">
            <option>Subcutaneous</option>
            <option>Intramuscular</option>
            <option>Oral</option>
            <option>Nasal</option>
            <option>Topical</option>
            <option>IV Push</option>
          </select>
        </div>
        <div class="form-group">
          <label>Injection Site</label>
          <input type="text" id="log-site" placeholder="e.g. abdomen, delt">
        </div>
        <div class="form-group">
          <label>Date & Time</label>
          <input type="datetime-local" id="log-datetime">
        </div>
        <div class="form-group">
          <label>&nbsp;</label>
          <button class="btn btn-primary" onclick="addLog()" style="width:100%">Log Dose</button>
        </div>
        <div class="form-group full">
          <label>Notes</label>
          <textarea id="log-notes" placeholder="How you feel, side effects, etc."></textarea>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>History</h2>
      <div class="filter-row">
        <select id="filter-peptide" onchange="renderLogs()">
          <option value="">All Peptides</option>
        </select>
        <input type="date" id="filter-date" onchange="renderLogs()">
      </div>
      <div id="log-list"></div>
    </div>
  </div>

  <!-- ==================== CALENDAR TAB ==================== -->
  <div id="tab-calendar" class="tab">
    <div class="card">
      <h2>Last Taken</h2>
      <div id="last-taken-list"></div>
      <div class="btn-row">
        <button class="btn btn-outline btn-sm" onclick="exportToAppleCal()">Export to Apple Calendar (.ics)</button>
      </div>
    </div>

    <div class="card">
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">&larr;</button>
        <span class="month-label" id="cal-month-label"></span>
        <button onclick="changeMonth(1)">&rarr;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="cal-day-detail" id="cal-day-detail"></div>
    </div>
  </div>

  <!-- ==================== CALCULATOR TAB ==================== -->
  <div id="tab-calculator" class="tab">
    <div class="card">
      <h2>Reconstitution Calculator</h2>
      <p style="color:var(--text-dim);font-size:0.85rem;margin-bottom:14px;">Calculate how much to draw based on your vial and desired dose.</p>
      <div class="form-grid">
        <div class="form-group">
          <label>Peptide Amount in Vial (mg)</label>
          <input type="number" id="calc-vial-mg" placeholder="5" step="any">
        </div>
        <div class="form-group">
          <label>BAC Water Added (mL)</label>
          <input type="number" id="calc-water-ml" placeholder="2" step="any">
        </div>
        <div class="form-group">
          <label>Desired Dose (mcg)</label>
          <input type="number" id="calc-dose-mcg" placeholder="250" step="any">
        </div>
        <div class="form-group">
          <label>Syringe Type</label>
          <select id="calc-syringe">
            <option value="100">Insulin (100 units = 1mL)</option>
            <option value="50">0.5mL syringe (50 units)</option>
            <option value="30">0.3mL syringe (30 units)</option>
          </select>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="calculate()">Calculate</button>
      </div>
      <div id="calc-result"></div>
    </div>

    <div class="card">
      <h2>Quick Dose Reference</h2>
      <div id="saved-calcs"></div>
      <div class="btn-row">
        <button class="btn btn-outline btn-sm" onclick="saveCurrentCalc()">Save Current Calculation</button>
      </div>
    </div>

    <div class="card">
      <h2>Unit Converter</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Value</label>
          <input type="number" id="conv-value" placeholder="1" step="any" oninput="convert()">
        </div>
        <div class="form-group">
          <label>Convert</label>
          <select id="conv-type" onchange="convert()">
            <option value="mg-mcg">mg to mcg</option>
            <option value="mcg-mg">mcg to mg</option>
            <option value="ml-units">mL to units (insulin)</option>
            <option value="units-ml">units to mL (insulin)</option>
          </select>
        </div>
      </div>
      <div id="conv-result" style="margin-top:12px;font-size:1.1rem;font-weight:600;color:var(--success);"></div>
    </div>
  </div>

  <!-- ==================== INVENTORY TAB ==================== -->
  <div id="tab-inventory" class="tab">
    <div class="card">
      <h2>Add Vial to Inventory</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Peptide</label>
          <input type="text" id="inv-name" placeholder="BPC-157">
        </div>
        <div class="form-group">
          <label>Vial Size (mg)</label>
          <input type="number" id="inv-mg" placeholder="5" step="any">
        </div>
        <div class="form-group">
          <label>Date Reconstituted</label>
          <input type="date" id="inv-recon-date">
        </div>
        <div class="form-group">
          <label>Expiry / Discard By</label>
          <input type="date" id="inv-expiry">
        </div>
        <div class="form-group">
          <label>Source / Brand</label>
          <input type="text" id="inv-source" placeholder="Optional">
        </div>
        <div class="form-group">
          <label>BAC Water Added (mL)</label>
          <input type="number" id="inv-water" placeholder="2" step="any">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="addInventory()">Add Vial</button>
      </div>
    </div>
    <div class="card">
      <h2>Current Inventory</h2>
      <div id="inv-list"></div>
    </div>
  </div>

  <!-- ==================== SCHEDULE TAB ==================== -->
  <div id="tab-schedule" class="tab">
    <div class="card">
      <h2>Add Schedule</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Peptide</label>
          <select id="sched-peptide"></select>
        </div>
        <div class="form-group">
          <label>Dose</label>
          <input type="number" id="sched-dose" placeholder="10" step="any">
        </div>
        <div class="form-group">
          <label>Unit</label>
          <select id="sched-unit">
            <option value="units">Units</option>
            <option value="mcg">mcg</option>
            <option value="mg">mg</option>
            <option value="mL">mL</option>
            <option value="IU">IU</option>
          </select>
        </div>
        <div class="form-group">
          <label>Frequency</label>
          <select id="sched-freq">
            <option value="daily">Daily</option>
            <option value="2x-daily">2x Daily</option>
            <option value="eod">Every Other Day</option>
            <option value="3x-week">3x per Week</option>
            <option value="weekly">Weekly</option>
            <option value="5on2off">5 on / 2 off</option>
          </select>
        </div>
        <div class="form-group">
          <label>Preferred Time</label>
          <input type="time" id="sched-time" value="08:00">
        </div>
        <div class="form-group">
          <label>Notes</label>
          <input type="text" id="sched-notes" placeholder="e.g. empty stomach">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="addSchedule()">Add Schedule</button>
      </div>
    </div>
    <div class="card">
      <h2>Today's Schedule</h2>
      <div id="today-schedule"></div>
    </div>
    <div class="card">
      <h2>All Schedules</h2>
      <div id="sched-list"></div>
    </div>
  </div>

</main>

<script>
  // ========== PRE-LOADED PEPTIDES ==========
  const DEFAULT_PEPTIDES = ['B12 1000mg', 'Cagrilintide', 'Glutathione', 'KLOW', 'Melanotan 1', 'NAD 500+', 'Retatrutide', 'Tirzepatide'];

  // ========== DATA STORE ==========
  function getData(key) { return JSON.parse(localStorage.getItem('pt_' + key) || '[]'); }
  function setData(key, val) { localStorage.setItem('pt_' + key, JSON.stringify(val)); }

  // ========== TABS ==========
  function showTab(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    event.target.classList.add('active');
    if (id === 'log') { renderLogs(); renderStats(); }
    if (id === 'calendar') { renderCalendar(); renderLastTaken(); }
    if (id === 'inventory') renderInventory();
    if (id === 'schedule') renderSchedules();
    refreshPeptideDropdowns();
  }

  // ========== PEPTIDE LIST ==========
  function getAllPeptides() {
    const logs = getData('logs');
    const inv = getData('inventory');
    const scheds = getData('schedules');
    const names = new Set(DEFAULT_PEPTIDES);
    logs.forEach(l => names.add(l.peptide));
    inv.forEach(i => names.add(i.name));
    scheds.forEach(s => names.add(s.peptide));
    return [...names].filter(Boolean).sort();
  }

  function refreshPeptideDropdowns() {
    const peptides = getAllPeptides();
    ['log-peptide', 'filter-peptide', 'sched-peptide'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      const val = el.value;
      el.innerHTML = '';
      if (id === 'filter-peptide') el.innerHTML = '<option value="">All Peptides</option>';
      else el.innerHTML = '<option value="">Select peptide</option>';
      peptides.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p; opt.textContent = p;
        el.appendChild(opt);
      });
      el.value = val;
    });
  }

  // ========== LOGGING ==========
  function addLog() {
    let peptide = document.getElementById('log-peptide').value || document.getElementById('log-peptide-new').value.trim();
    const dose = document.getElementById('log-dose').value;
    const unit = document.getElementById('log-unit').value;
    const route = document.getElementById('log-route').value;
    const site = document.getElementById('log-site').value;
    const datetime = document.getElementById('log-datetime').value || new Date().toISOString().slice(0, 16);
    const notes = document.getElementById('log-notes').value;

    if (!peptide) return alert('Please select or enter a peptide name.');
    if (!dose) return alert('Please enter a dose.');

    const logs = getData('logs');
    logs.unshift({ id: Date.now(), peptide, dose: parseFloat(dose), unit, route, site, datetime, notes });
    setData('logs', logs);

    document.getElementById('log-peptide-new').value = '';
    document.getElementById('log-dose').value = '';
    document.getElementById('log-site').value = '';
    document.getElementById('log-notes').value = '';

    renderLogs();
    renderStats();
    refreshPeptideDropdowns();
  }

  function deleteLog(id) {
    setData('logs', getData('logs').filter(l => l.id !== id));
    renderLogs();
    renderStats();
  }

  function renderLogs() {
    const logs = getData('logs');
    const filterPeptide = document.getElementById('filter-peptide').value;
    const filterDate = document.getElementById('filter-date').value;
    const container = document.getElementById('log-list');

    let filtered = logs;
    if (filterPeptide) filtered = filtered.filter(l => l.peptide === filterPeptide);
    if (filterDate) filtered = filtered.filter(l => l.datetime.startsWith(filterDate));

    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty-state">No doses logged yet.</div>';
      return;
    }

    container.innerHTML = filtered.map(l => {
      const d = new Date(l.datetime);
      const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      const doseUnit = l.unit || 'mcg';
      const details = [l.route, l.site, timeStr].filter(Boolean).join(' &middot; ');
      return `<div class="log-entry">
        <div class="info">
          <div class="peptide-name">${l.peptide}</div>
          <div class="details">${dateStr} &middot; ${details}${l.notes ? '<br>' + l.notes : ''}</div>
        </div>
        <span class="dose-badge">${l.dose} ${doseUnit}</span>
        <button class="delete-btn" onclick="deleteLog(${l.id})" title="Delete">&times;</button>
      </div>`;
    }).join('');
  }

  function renderStats() {
    const logs = getData('logs');
    const today = new Date().toISOString().slice(0, 10);
    const todayLogs = logs.filter(l => l.datetime.startsWith(today));
    const thisWeek = logs.filter(l => {
      const d = new Date(l.datetime);
      return d >= new Date(Date.now() - 7 * 86400000);
    });
    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><div class="val">${todayLogs.length}</div><div class="lbl">Today</div></div>
      <div class="stat-card"><div class="val">${thisWeek.length}</div><div class="lbl">This Week</div></div>
      <div class="stat-card"><div class="val">${getAllPeptides().length}</div><div class="lbl">Peptides</div></div>
    `;
  }

  // ========== CALENDAR ==========
  let calYear, calMonth;

  function initCalendar() {
    const now = new Date();
    calYear = now.getFullYear();
    calMonth = now.getMonth();
  }

  function changeMonth(dir) {
    calMonth += dir;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    if (calMonth > 11) { calMonth = 0; calYear++; }
    renderCalendar();
    document.getElementById('cal-day-detail').innerHTML = '';
  }

  function renderCalendar() {
    const logs = getData('logs');
    const label = document.getElementById('cal-month-label');
    const grid = document.getElementById('cal-grid');
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    label.textContent = `${monthNames[calMonth]} ${calYear}`;

    // Build map of date -> logs
    const logsByDate = {};
    logs.forEach(l => {
      const dateKey = l.datetime.slice(0, 10);
      if (!logsByDate[dateKey]) logsByDate[dateKey] = [];
      logsByDate[dateKey].push(l);
    });

    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const today = new Date().toISOString().slice(0, 10);

    let html = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d =>
      `<div class="cal-header">${d}</div>`
    ).join('');

    // Empty cells before first day
    for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = dateStr === today;
      const dayLogs = logsByDate[dateStr] || [];
      const uniquePeptides = new Set(dayLogs.map(l => l.peptide));
      let dots = '';
      if (uniquePeptides.size > 0) {
        const dotArr = [...uniquePeptides].slice(0, 4).map((_, i) =>
          `<div class="dot ${uniquePeptides.size > 2 ? 'multi' : ''}"></div>`
        );
        dots = `<div class="dots">${dotArr.join('')}</div>`;
      }
      html += `<div class="cal-day ${isToday ? 'today' : ''}" onclick="showDayDetail('${dateStr}')">${d}${dots}</div>`;
    }

    grid.innerHTML = html;
  }

  function showDayDetail(dateStr) {
    const logs = getData('logs');
    const dayLogs = logs.filter(l => l.datetime.startsWith(dateStr));
    const el = document.getElementById('cal-day-detail');
    const d = new Date(dateStr + 'T12:00:00');
    const dateLabel = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

    if (dayLogs.length === 0) {
      el.innerHTML = `<div style="margin-top:8px;color:var(--text-dim);font-size:0.9rem;">${dateLabel} &mdash; No doses logged</div>`;
      return;
    }

    el.innerHTML = `<div style="margin-bottom:8px;font-weight:600;font-size:0.9rem;">${dateLabel}</div>` +
      dayLogs.map(l => {
        const t = new Date(l.datetime).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        const doseUnit = l.unit || 'mcg';
        return `<div class="log-entry">
          <div class="info">
            <div class="peptide-name">${l.peptide}</div>
            <div class="details">${t} &middot; ${l.route}${l.notes ? ' &middot; ' + l.notes : ''}</div>
          </div>
          <span class="dose-badge">${l.dose} ${doseUnit}</span>
        </div>`;
      }).join('');
  }

  function renderLastTaken() {
    const logs = getData('logs');
    const peptides = getAllPeptides();
    const el = document.getElementById('last-taken-list');

    if (peptides.length === 0) {
      el.innerHTML = '<div class="empty-state">No peptides yet.</div>';
      return;
    }

    el.innerHTML = peptides.map(p => {
      const lastLog = logs.find(l => l.peptide === p);
      if (!lastLog) {
        return `<div class="last-taken">
          <div><div style="font-weight:600">${p}</div><div style="font-size:0.8rem;color:var(--text-dim)">Never taken</div></div>
          <div class="days-ago overdue">--</div>
        </div>`;
      }
      const lastDate = new Date(lastLog.datetime);
      const diffMs = Date.now() - lastDate.getTime();
      const diffDays = Math.floor(diffMs / 86400000);
      const diffHours = Math.floor(diffMs / 3600000);
      let agoText, agoClass;
      if (diffHours < 24) { agoText = diffHours === 0 ? 'Just now' : `${diffHours}h ago`; agoClass = 'recent'; }
      else if (diffDays === 1) { agoText = 'Yesterday'; agoClass = 'recent'; }
      else if (diffDays <= 7) { agoText = `${diffDays} days ago`; agoClass = 'recent'; }
      else { agoText = `${diffDays} days ago`; agoClass = 'overdue'; }

      const doseUnit = lastLog.unit || 'mcg';
      const dateStr = lastDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      return `<div class="last-taken">
        <div>
          <div style="font-weight:600">${p}</div>
          <div style="font-size:0.8rem;color:var(--text-dim)">${dateStr} &middot; ${lastLog.dose} ${doseUnit}</div>
        </div>
        <div class="days-ago ${agoClass}">${agoText}</div>
      </div>`;
    }).join('');
  }

  // ========== APPLE CALENDAR EXPORT ==========
  function exportToAppleCal() {
    const logs = getData('logs');
    if (logs.length === 0) return alert('No logs to export.');

    let ical = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//PeptideTracker//EN\r\nCALSCALE:GREGORIAN\r\n';

    logs.forEach(l => {
      const dt = l.datetime.replace(/[-:]/g, '').replace('T', 'T') + '00';
      const dtEnd = new Date(new Date(l.datetime).getTime() + 5 * 60000);
      const endStr = dtEnd.toISOString().replace(/[-:]/g, '').replace(/\.\d+Z/, '');
      const doseUnit = l.unit || 'mcg';
      ical += 'BEGIN:VEVENT\r\n';
      ical += `DTSTART:${dt}\r\n`;
      ical += `DTEND:${endStr}\r\n`;
      ical += `SUMMARY:${l.peptide} - ${l.dose} ${doseUnit}\r\n`;
      ical += `DESCRIPTION:Route: ${l.route}${l.site ? '\\nSite: ' + l.site : ''}${l.notes ? '\\nNotes: ' + l.notes : ''}\r\n`;
      ical += `UID:peptide-${l.id}@tracker\r\n`;
      ical += 'END:VEVENT\r\n';
    });

    ical += 'END:VCALENDAR\r\n';

    const blob = new Blob([ical], { type: 'text/calendar' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'peptide-log.ics';
    a.click();
  }

  // ========== CALCULATOR ==========
  function calculate() {
    const vialMg = parseFloat(document.getElementById('calc-vial-mg').value);
    const waterMl = parseFloat(document.getElementById('calc-water-ml').value);
    const doseMcg = parseFloat(document.getElementById('calc-dose-mcg').value);
    if (!vialMg || !waterMl || !doseMcg) return alert('Please fill in all fields.');

    const vialMcg = vialMg * 1000;
    const concentrationMcgPerMl = vialMcg / waterMl;
    const doseVolumeMl = doseMcg / concentrationMcgPerMl;
    const doseUnits = doseVolumeMl * 100;
    const totalDoses = Math.floor(vialMcg / doseMcg);

    document.getElementById('calc-result').innerHTML = `
      <div class="calc-result">
        <div class="big-number">${doseUnits.toFixed(1)} units</div>
        <div class="unit">Draw to the ${doseUnits.toFixed(1)} mark on your syringe</div>
        <div class="calc-breakdown">
          <div class="item"><div class="val">${doseVolumeMl.toFixed(3)} mL</div><div class="lbl">Volume per dose</div></div>
          <div class="item"><div class="val">${concentrationMcgPerMl.toFixed(0)} mcg/mL</div><div class="lbl">Concentration</div></div>
          <div class="item"><div class="val">${totalDoses}</div><div class="lbl">Doses per vial</div></div>
          <div class="item"><div class="val">${(vialMg - (doseMcg/1000)).toFixed(2)} mg</div><div class="lbl">After 1 dose</div></div>
        </div>
      </div>`;
  }

  function saveCurrentCalc() {
    const vialMg = document.getElementById('calc-vial-mg').value;
    const waterMl = document.getElementById('calc-water-ml').value;
    const doseMcg = document.getElementById('calc-dose-mcg').value;
    if (!vialMg || !waterMl || !doseMcg) return alert('Run a calculation first.');
    const name = prompt('Name this calculation (e.g. "BPC-157 250mcg"):');
    if (!name) return;
    const calcs = getData('savedCalcs');
    const doseUnits = (parseFloat(doseMcg) / (parseFloat(vialMg) * 1000 / parseFloat(waterMl))) * 100;
    calcs.push({ id: Date.now(), name, vialMg, waterMl, doseMcg, units: doseUnits.toFixed(1) });
    setData('savedCalcs', calcs);
    renderSavedCalcs();
  }

  function renderSavedCalcs() {
    const calcs = getData('savedCalcs');
    const el = document.getElementById('saved-calcs');
    if (calcs.length === 0) { el.innerHTML = '<div class="empty-state">No saved calculations.</div>'; return; }
    el.innerHTML = calcs.map(c => `
      <div class="log-entry">
        <div class="info">
          <div class="peptide-name">${c.name}</div>
          <div class="details">${c.vialMg}mg vial + ${c.waterMl}mL water &middot; ${c.doseMcg}mcg dose</div>
        </div>
        <span class="dose-badge">${c.units} units</span>
        <button class="delete-btn" onclick="deleteSavedCalc(${c.id})">&times;</button>
      </div>`).join('');
  }

  function deleteSavedCalc(id) {
    setData('savedCalcs', getData('savedCalcs').filter(c => c.id !== id));
    renderSavedCalcs();
  }

  function convert() {
    const val = parseFloat(document.getElementById('conv-value').value);
    const type = document.getElementById('conv-type').value;
    const el = document.getElementById('conv-result');
    if (!val) { el.textContent = ''; return; }
    const conversions = {
      'mg-mcg': { result: val * 1000, unit: 'mcg' },
      'mcg-mg': { result: val / 1000, unit: 'mg' },
      'ml-units': { result: val * 100, unit: 'units' },
      'units-ml': { result: val / 100, unit: 'mL' },
    };
    const c = conversions[type];
    el.textContent = `= ${c.result} ${c.unit}`;
  }

  // ========== INVENTORY ==========
  function addInventory() {
    const name = document.getElementById('inv-name').value.trim();
    const mg = parseFloat(document.getElementById('inv-mg').value);
    if (!name || !mg) return alert('Please enter peptide name and vial size.');
    const inv = getData('inventory');
    inv.push({
      id: Date.now(), name, mg, remainingMg: mg,
      reconDate: document.getElementById('inv-recon-date').value,
      expiry: document.getElementById('inv-expiry').value,
      source: document.getElementById('inv-source').value,
      water: document.getElementById('inv-water').value
    });
    setData('inventory', inv);
    document.getElementById('inv-name').value = '';
    document.getElementById('inv-mg').value = '';
    document.getElementById('inv-source').value = '';
    document.getElementById('inv-water').value = '';
    renderInventory();
    refreshPeptideDropdowns();
  }

  function deleteInventoryItem(id) {
    setData('inventory', getData('inventory').filter(i => i.id !== id));
    renderInventory();
  }

  function renderInventory() {
    const inv = getData('inventory');
    const el = document.getElementById('inv-list');
    if (inv.length === 0) { el.innerHTML = '<div class="empty-state">No vials in inventory.</div>'; return; }
    el.innerHTML = inv.map(item => {
      const pct = (item.remainingMg / item.mg) * 100;
      const color = pct > 30 ? 'var(--success)' : pct > 10 ? 'var(--warning)' : 'var(--danger)';
      const statusClass = pct > 30 ? '' : pct > 10 ? 'low' : 'out';
      const expStr = item.expiry ? ` &middot; Exp: ${item.expiry}` : '';
      const srcStr = item.source ? ` &middot; ${item.source}` : '';
      return `<div class="inv-item">
        <div>
          <div style="font-weight:600;">${item.name}</div>
          <div class="remaining ${statusClass}">${item.remainingMg.toFixed(2)} / ${item.mg} mg remaining${expStr}${srcStr}</div>
          <div class="progress-bar"><div class="fill" style="width:${pct}%;background:${color}"></div></div>
        </div>
        <button class="delete-btn" onclick="deleteInventoryItem(${item.id})" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1.2rem;">&times;</button>
      </div>`;
    }).join('');
  }

  // ========== SCHEDULE ==========
  function addSchedule() {
    const peptide = document.getElementById('sched-peptide').value;
    const dose = document.getElementById('sched-dose').value;
    const unit = document.getElementById('sched-unit').value;
    const freq = document.getElementById('sched-freq').value;
    const time = document.getElementById('sched-time').value;
    const notes = document.getElementById('sched-notes').value;
    if (!peptide || !dose) return alert('Please select a peptide and dose.');
    const scheds = getData('schedules');
    scheds.push({ id: Date.now(), peptide, dose: parseFloat(dose), unit, freq, time, notes, active: true });
    setData('schedules', scheds);
    renderSchedules();
  }

  function deleteSchedule(id) {
    setData('schedules', getData('schedules').filter(s => s.id !== id));
    renderSchedules();
  }

  function isDueToday(sched) {
    const logs = getData('logs');
    const today = new Date().toISOString().slice(0, 10);
    const todayLogs = logs.filter(l =>
      l.peptide.toLowerCase() === sched.peptide.toLowerCase() && l.datetime.startsWith(today)
    );
    if (sched.freq === 'daily' || sched.freq === '5on2off') return todayLogs.length === 0;
    if (sched.freq === '2x-daily') return todayLogs.length < 2;
    if (sched.freq === 'eod') {
      const lastLog = logs.find(l => l.peptide.toLowerCase() === sched.peptide.toLowerCase());
      if (!lastLog) return true;
      const diffDays = Math.floor((Date.now() - new Date(lastLog.datetime)) / 86400000);
      return diffDays >= 2 || (todayLogs.length === 0 && diffDays >= 1);
    }
    if (sched.freq === '3x-week') {
      const weekLogs = logs.filter(l => l.peptide.toLowerCase() === sched.peptide.toLowerCase() && (Date.now() - new Date(l.datetime)) < 7 * 86400000);
      return weekLogs.length < 3 && todayLogs.length === 0;
    }
    if (sched.freq === 'weekly') {
      const weekLogs = logs.filter(l => l.peptide.toLowerCase() === sched.peptide.toLowerCase() && (Date.now() - new Date(l.datetime)) < 7 * 86400000);
      return weekLogs.length === 0;
    }
    return false;
  }

  const freqLabels = { 'daily': 'Daily', '2x-daily': '2x Daily', 'eod': 'Every Other Day', '3x-week': '3x / Week', 'weekly': 'Weekly', '5on2off': '5 on / 2 off' };

  function renderSchedules() {
    const scheds = getData('schedules');
    const todayEl = document.getElementById('today-schedule');
    if (scheds.length === 0) {
      todayEl.innerHTML = '<div class="empty-state">No schedules set up yet.</div>';
    } else {
      todayEl.innerHTML = scheds.map(s => {
        const due = isDueToday(s);
        const doseUnit = s.unit || 'mcg';
        return `<div class="schedule-item">
          <div class="schedule-dot ${due ? 'due' : ''}"></div>
          <div style="flex:1">
            <div style="font-weight:600">${s.peptide} - ${s.dose} ${doseUnit}</div>
            <div style="font-size:0.85rem;color:var(--text-dim)">${s.time} &middot; ${due ? 'Due today' : 'Done for today'}</div>
          </div>
          ${due ? `<button class="btn btn-primary btn-sm" onclick="quickLog('${s.peptide.replace(/'/g, "\\'")}', ${s.dose}, '${doseUnit}')">Log Now</button>` : '<span style="color:var(--success)">&#10003;</span>'}
        </div>`;
      }).join('');
    }
    const listEl = document.getElementById('sched-list');
    if (scheds.length === 0) {
      listEl.innerHTML = '<div class="empty-state">No schedules.</div>';
    } else {
      listEl.innerHTML = scheds.map(s => {
        const doseUnit = s.unit || 'mcg';
        return `<div class="log-entry">
          <div class="info">
            <div class="peptide-name">${s.peptide}</div>
            <div class="details">${s.dose} ${doseUnit} &middot; ${freqLabels[s.freq]} at ${s.time}${s.notes ? ' &middot; ' + s.notes : ''}</div>
          </div>
          <button class="delete-btn" onclick="deleteSchedule(${s.id})">&times;</button>
        </div>`;
      }).join('');
    }
  }

  function quickLog(peptide, dose, unit) {
    const logs = getData('logs');
    logs.unshift({
      id: Date.now(), peptide, dose, unit: unit || 'units',
      route: 'Subcutaneous', site: '',
      datetime: new Date().toISOString().slice(0, 16),
      notes: 'Quick log from schedule'
    });
    setData('logs', logs);
    renderSchedules();
    renderStats();
    renderLogs();
  }

  // ========== INIT ==========
  function init() {
    initCalendar();
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('log-datetime').value = now.toISOString().slice(0, 16);
    document.getElementById('inv-recon-date').value = now.toISOString().slice(0, 10);
    refreshPeptideDropdowns();
    renderLogs();
    renderStats();
    renderSavedCalcs();
  }

  init();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
